name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Enable Corepack
        run: corepack enable

      - name: Install native build dependencies
        run: sudo apt-get install -y libsqlite3-dev

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint:all

      - name: Compile TypeScript
        run: yarn tsc:full

      - name: Run Tests
        run: yarn test:all

      - name: Run Audit
        run: yarn audit --level high || true

      # ── E2E shared setup ────────────────────────────────────────────────────

      - name: Validate common secrets
        env:
          TENANT_APP_URL: ${{ secrets.TENANT_APP_URL }}
        run: |
          if [ -z "$TENANT_APP_URL" ]; then
            echo "Missing required secret: TENANT_APP_URL"
            exit 1
          fi

      - name: Typecheck e2e
        run: yarn tsc:e2e

      - name: Install Playwright Browsers
        run: yarn e2e:install-browsers

      # ── E2E: platform-token ─────────────────────────────────────────────────

      - name: Validate platform-token secrets
        env:
          PLATFORM_TOKEN: ${{ secrets.PLATFORM_TOKEN }}
        run: |
          if [ -z "$PLATFORM_TOKEN" ]; then
            echo "Missing required secret for platform-token mode: PLATFORM_TOKEN"
            exit 1
          fi

      - name: Generate app-config for platform-token
        env:
          TENANT_APP_URL: ${{ secrets.TENANT_APP_URL }}
          PLATFORM_TOKEN: ${{ secrets.PLATFORM_TOKEN }}
        run: envsubst '${TENANT_APP_URL} ${PLATFORM_TOKEN}' < e2e/app-config.platform-token.template > app-config.local.yaml

      - name: Start dev server (platform-token)
        run: yarn dev > dev-server-platform-token.log 2>&1 &
             echo $! > .dev-server.pid

      - name: Wait for dev server (platform-token)
        run: yarn wait-on http://localhost:3000 tcp:localhost:7007 --timeout 60000 || (echo "=== better-sqlite3 build/Release ===" && ls node_modules/better-sqlite3/build/Release/ 2>/dev/null || echo "MISSING" && echo "=== better-sqlite3 lib/binding ===" && ls node_modules/better-sqlite3/lib/binding/ 2>/dev/null || echo "MISSING" && echo "=== node-gyp install test ===" && node -e "require('better-sqlite3')" 2>&1 | head -5 && exit 1)

      - name: Run Playwright tests (platform-token)
        id: playwright-platform-token
        env:
          TENANT_APP_URL: ${{ secrets.TENANT_APP_URL }}
        run: yarn e2e

      - name: Stop dev server (platform-token)
        if: always()
        run: kill $(cat .dev-server.pid) || true

      - name: Upload dev server log (platform-token)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dev-server-log-platform-token
          path: dev-server-platform-token.log
          retention-days: 30

      - name: Log Playwright results (platform-token)
        if: always()
        run: |
          if [ "${{ steps.playwright-platform-token.outcome }}" == "success" ]; then
            echo "### Playwright Test Results" >> $GITHUB_STEP_SUMMARY
            echo "✅ Playwright tests completed successfully (platform-token)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Playwright Test Results" >> $GITHUB_STEP_SUMMARY
            echo "❌ Playwright tests failed (platform-token)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Playwright report (platform-token)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-platform-token
          path: playwright-report/
          retention-days: 30

      # ── E2E: oauth ──────────────────────────────────────────────────────────

      - name: Validate oauth secrets
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_ACCOUNT_URN: ${{ secrets.OAUTH_ACCOUNT_URN }}
          OAUTH_TOKEN_URL: ${{ secrets.OAUTH_TOKEN_URL }}
        run: |
          if [ -z "$OAUTH_CLIENT_ID" ] || [ -z "$OAUTH_CLIENT_SECRET" ] || [ -z "$OAUTH_ACCOUNT_URN" ] || [ -z "$OAUTH_TOKEN_URL" ]; then
            echo "Missing one or more required secrets for oauth mode: OAUTH_CLIENT_ID, OAUTH_CLIENT_SECRET, OAUTH_ACCOUNT_URN, OAUTH_TOKEN_URL"
            exit 1
          fi

      - name: Generate app-config for oauth
        env:
          TENANT_APP_URL: ${{ secrets.TENANT_APP_URL }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_ACCOUNT_URN: ${{ secrets.OAUTH_ACCOUNT_URN }}
          OAUTH_TOKEN_URL: ${{ secrets.OAUTH_TOKEN_URL }}
        run: envsubst '${TENANT_APP_URL} ${OAUTH_CLIENT_ID} ${OAUTH_CLIENT_SECRET} ${OAUTH_ACCOUNT_URN} ${OAUTH_TOKEN_URL}' < e2e/app-config.oauth.template > app-config.local.yaml

      - name: Start dev server (oauth)
        run: yarn dev > dev-server-oauth.log 2>&1 &
             echo $! > .dev-server.pid

      - name: Wait for dev server (oauth)
        run: yarn wait-on http://localhost:3000 tcp:localhost:7007 --timeout 60000

      - name: Run Playwright tests (oauth)
        id: playwright-oauth
        env:
          TENANT_APP_URL: ${{ secrets.TENANT_APP_URL }}
        run: yarn e2e

      - name: Stop dev server (oauth)
        if: always()
        run: kill $(cat .dev-server.pid) || true

      - name: Upload dev server log (oauth)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dev-server-log-oauth
          path: dev-server-oauth.log
          retention-days: 30

      - name: Log Playwright results (oauth)
        if: always()
        run: |
          if [ "${{ steps.playwright-oauth.outcome }}" == "success" ]; then
            echo "### Playwright Test Results" >> $GITHUB_STEP_SUMMARY
            echo "✅ Playwright tests completed successfully (oauth)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Playwright Test Results" >> $GITHUB_STEP_SUMMARY
            echo "❌ Playwright tests failed (oauth)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Playwright report (oauth)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-oauth
          path: playwright-report/
          retention-days: 30
